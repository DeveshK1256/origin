app = "ai-recruitment-intelligence-api"
primary_region = "sin"

[build]

[env]
  PORT = "8080"
  DATABASE_BACKEND = "supabase"
  SUPABASE_FALLBACK_LOCAL = "1"
  AUTH_MODE = "auto"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "get"
    path = "/api/health"
    timeout = "5s"

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 80

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
