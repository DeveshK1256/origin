services:
  - type: web
    name: ai-recruitment-intelligence-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm && python ml/train_fake_job_model.py
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app
